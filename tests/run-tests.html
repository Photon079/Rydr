<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Rydr - Unit Tests</title>
  <style>
    body {
      font-family: 'Courier New', monospace;
      background: #1a1a1a;
      color: #00ff00;
      padding: 20px;
      max-width: 800px;
      margin: 0 auto;
    }
    h1 { color: #00ff00; border-bottom: 2px solid #00ff00; padding-bottom: 10px; }
    .test-output {
      background: #000;
      padding: 20px;
      border-radius: 8px;
      border: 1px solid #00ff00;
      margin: 20px 0;
      white-space: pre-wrap;
      font-size: 14px;
    }
    button {
      background: #00ff00;
      color: #000;
      border: none;
      padding: 12px 24px;
      font-size: 16px;
      font-weight: bold;
      cursor: pointer;
      border-radius: 4px;
      margin: 10px 5px;
    }
    button:hover { background: #00cc00; }
  </style>
</head>
<body>
  <h1>🧪 Rydr Unit Tests</h1>
  <p>Run individual test suites or all tests at once</p>
  
  <button onclick="runBatteryTests()">Battery Tests</button>
  <button onclick="runRoutingTests()">Routing Tests</button>
  <button onclick="runSwapStationTests()">Swap Station Tests</button>
  <button onclick="runAllTests()">Run All Tests</button>
  
  <div id="output" class="test-output">Click a button to run tests...</div>

  <script type="module">
    import * as batteryTests from './battery.test.js';
    import * as routingTests from './routing.test.js';
    import * as swapStationTests from './swapstation.test.js';

    const output = document.getElementById('output');

    function captureConsole(fn) {
      const logs = [];
      const originalLog = console.log;
      console.log = (...args) => {
        logs.push(args.join(' '));
        originalLog(...args);
      };
      fn();
      console.log = originalLog;
      return logs.join('\n');
    }

    window.runBatteryTests = () => {
      output.textContent = captureConsole(() => {
        batteryTests.testBatteryDrainCalculation();
        batteryTests.testRainMultiplier();
        batteryTests.testLowBatteryThreshold();
      });
    };

    window.runRoutingTests = () => {
      output.textContent = captureConsole(() => {
        routingTests.testDistanceCalculation();
        routingTests.testTimeEstimation();
        routingTests.testRouteFeasibility();
      });
    };

    window.runSwapStationTests = () => {
      output.textContent = captureConsole(() => {
        swapStationTests.testNearestStationSelection();
        swapStationTests.testStationStatusFiltering();
        swapStationTests.testDetourTimeCalculation();
      });
    };

    window.runAllTests = () => {
      output.textContent = captureConsole(() => {
        console.log('='.repeat(50));
        console.log('RUNNING ALL RYDR UNIT TESTS');
        console.log('='.repeat(50));
        
        batteryTests.testBatteryDrainCalculation();
        batteryTests.testRainMultiplier();
        batteryTests.testLowBatteryThreshold();
        
        routingTests.testDistanceCalculation();
        routingTests.testTimeEstimation();
        routingTests.testRouteFeasibility();
        
        swapStationTests.testNearestStationSelection();
        swapStationTests.testStationStatusFiltering();
        swapStationTests.testDetourTimeCalculation();
        
        console.log('='.repeat(50));
        console.log('ALL TESTS COMPLETE');
        console.log('='.repeat(50));
      });
    };
  </script>
</body>
</html>
